      path: /v1/projects/{projectID}/endpoints/oauth2/test
      operations:
      - name: TestOAuth2Connection
        method: POST
        description: Test OAuth2 connection
        inputParameters:
        - name: projectID
          in: path
          type: string
          required: true
          description: Project ID
        - name: body
          in: body
          type: object
          required: true
          description: Request body payload.
