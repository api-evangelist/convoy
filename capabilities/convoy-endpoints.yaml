        method: PUT
        description: Update an endpoint
        inputParameters:
        - name: projectID
          in: path
          type: string
          required: true
          description: Project ID
        - name: endpointID
          in: path
          type: string
          required: true
          description: Endpoint ID
        - name: body
          in: body
          type: object
          required: true
          description: Request body payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
