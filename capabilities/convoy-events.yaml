naftiko: 1.0.0-alpha2
info:
  label: "Convoy API \u2014 Events"
  description: "Convoy webhooks gateway \u2014 Events. 8 operations. Lead operation: List all events. Self-contained Naftiko\
    \ capability covering one Convoy business surface."
  tags:
  - Convoy
  - Webhooks
  - Events
  created: '2026-05-22'
  modified: '2026-05-22'
binds:
- namespace: env
  keys:
    CONVOY_API_KEY: CONVOY_API_KEY
capability:
  consumes:
  - type: http
    namespace: convoy-events
    baseUri: https://us.getconvoy.cloud/api
    description: "Convoy API \u2014 Events business capability. Self-contained, no shared references."
    authentication:
      type: bearer
      token: '{{env.CONVOY_API_KEY}}'
    resources:
    - name: v1-projects-project-id-events
      path: /v1/projects/{projectID}/events
      operations:
      - name: GetEventsPaged
        method: GET
        description: List all events
        inputParameters:
        - name: projectID
          in: path
          type: string
          required: true
          description: Project ID
        - name: direction
          in: query
          type: string
          required: false
          description: query parameter direction
        - name: endDate
          in: query
          type: string
          required: false
          description: The end date
        - name: endpointId
          in: query
          type: array
          required: false
          description: A list of endpoint ids to filter by
        - name: idempotencyKey
          in: query
          type: string
          required: false
          description: IdempotencyKey to filter by
        - name: next_page_cursor
          in: query
          type: string
          required: false
          description: A pagination cursor to fetch the next page of a list
        - name: perPage
          in: query
          type: integer
          required: false
          description: The number of items to return per page
        - name: prev_page_cursor
          in: query
          type: string
          required: false
          description: A pagination cursor to fetch the previous page of a list
        - name: query
          in: query
          type: string
          required: false
          description: Any arbitrary value to filter the events payload
        - name: sort
          in: query
          type: string
          required: false
          description: Sort order, values are `ASC` or `DESC`, defaults to `DESC`
        - name: sourceId
          in: query
          type: array
          required: false
          description: A list of Source IDs to filter the events by.
        - name: startDate
          in: query
          type: string
          required: false
          description: The start date
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: CreateEndpointEvent
        method: POST
        description: Create an event
        inputParameters:
        - name: projectID
          in: path
          type: string
          required: true
          description: Project ID
        - name: body
          in: body
          type: object
          required: true
          description: Request body payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v1-projects-project-id-events-batchreplay
      path: /v1/projects/{projectID}/events/batchreplay
      operations:
      - name: BatchReplayEvents
        method: POST
        description: Batch replay events
        inputParameters:
        - name: projectID
          in: path
          type: string
          required: true
          description: Project ID
        - name: direction
          in: query
          type: string
          required: false
          description: query parameter direction
        - name: endDate
          in: query
          type: string
          required: false
          description: The end date
        - name: endpointId
          in: query
          type: array
          required: false
          description: A list of endpoint ids to filter by
        - name: idempotencyKey
          in: query
          type: string
          required: false
          description: IdempotencyKey to filter by
        - name: next_page_cursor
          in: query
          type: string
          required: false
          description: A pagination cursor to fetch the next page of a list
        - name: perPage
          in: query
          type: integer
          required: false
          description: The number of items to return per page
        - name: prev_page_cursor
          in: query
          type: string
          required: false
          description: A pagination cursor to fetch the previous page of a list
        - name: query
          in: query
          type: string
          required: false
          description: Any arbitrary value to filter the events payload
        - name: sort
          in: query
          type: string
          required: false
          description: Sort order, values are `ASC` or `DESC`, defaults to `DESC`
        - name: sourceId
          in: query
          type: array
          required: false
          description: A list of Source IDs to filter the events by.
        - name: startDate
          in: query
          type: string
          required: false
          description: The start date
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v1-projects-project-id-events-broadcast
      path: /v1/projects/{projectID}/events/broadcast
      operations:
      - name: CreateBroadcastEvent
        method: POST
        description: Create a broadcast event
        inputParameters:
        - name: projectID
          in: path
          type: string
          required: true
          description: Project ID
        - name: body
          in: body
          type: object
          required: true
          description: Request body payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v1-projects-project-id-events-dynamic
      path: /v1/projects/{projectID}/events/dynamic
      operations:
      - name: CreateDynamicEvent
        method: POST
        description: Dynamic Events
        inputParameters:
        - name: projectID
          in: path
          type: string
          required: true
