        mapping: $.
    - name: test-filter
      description: Test a filter
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: convoy-filters.TestFilter
      with:
        projectID: tools.projectID
        subscriptionID: tools.subscriptionID
        eventType: tools.eventType
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-filter
      description: Delete a filter
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: convoy-filters.DeleteFilter
      with:
        projectID: tools.projectID
        subscriptionID: tools.subscriptionID
        filterID: tools.filterID
      outputParameters:
      - type: object
        mapping: $.
    - name: get-filter
      description: Get a filter
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: convoy-filters.GetFilter
      with:
        projectID: tools.projectID
        subscriptionID: tools.subscriptionID
        filterID: tools.filterID
      outputParameters:
      - type: object
        mapping: $.
    - name: update-filter
      description: Update a filter
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: convoy-filters.UpdateFilter
      with:
        projectID: tools.projectID
        subscriptionID: tools.subscriptionID
        filterID: tools.filterID
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
